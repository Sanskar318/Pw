<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STREAMx - Playing Lecture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    
    <style>
        /* Modern Video.js Dark Skin Overrides */
        .video-js {
            background-color: #05050a;
            border-radius: 12px;
            overflow: hidden;
        }
        .vjs-big-play-button {
            background-color: rgba(99, 102, 241, 0.8) !important;
            border: none !important;
            border-radius: 50% !important;
            width: 2.5em !important;
            height: 2.5em !important;
            line-height: 2.5em !important;
            margin-top: -1.25em !important;
            margin-left: -1.25em !important;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
        }
        .video-js .vjs-control-bar {
            background-color: rgba(9, 10, 15, 0.8) !important;
            backdrop-filter: blur(10px);
        }
        .video-js .vjs-play-progress {
            background-color: #6366f1 !important;
        }
    </style>
</head>
<body class="bg-[#090a0f] text-slate-100 min-h-screen font-sans flex flex-col justify-between">

    <header class="border-b border-slate-800/60 bg-[#090a0f]/80 backdrop-blur px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="store.html" class="text-sm text-slate-400 hover:text-white transition flex items-center gap-2">
                ← Back to Batch Store
            </a>
            <div class="text-xl font-black tracking-wider text-white">STREAM<span class="text-indigo-500">X</span></div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8 w-full flex-grow flex flex-col justify-center">
        
        <div class="w-full bg-slate-900/30 border border-slate-800/80 rounded-2xl p-4 backdrop-blur-sm shadow-2xl mb-6">
            <div class="position-relative aspect-video w-full">
                <video
                    id="pw-hls-player"
                    class="video-js vjs-default-skin vjs-16-9 w-full h-full"
                    controls
                    preload="auto"
                    data-setup='{}'>
                    <p class="vjs-no-js">
                        To view this video please enable JavaScript, and consider upgrading to a web browser that supports HTML5 video.
                    </p>
                </video>
            </div>
        </div>

        <div class="border-t border-slate-800/60 pt-4">
            <span class="inline-block px-2.5 py-1 text-xs font-semibold text-indigo-400 bg-indigo-950/40 border border-indigo-500/20 rounded-md mb-2">
                Now Streaming
            </span>
            <h1 id="lectureTitle" class="text-xl md:text-2xl font-bold text-white tracking-tight">
                Loading Lecture Title...
            </h1>
            <p class="text-slate-400 text-sm mt-1">
                Bina buffering aur high-quality adaptive bitrate ke sath seekhte rahein.
            </p>
        </div>

    </main>

    <footer class="border-t border-slate-900 bg-[#06070a] px-6 py-4 text-center text-xs text-slate-600 w-full">
        <p>&copy; 2026 STREAMx Player. Powered by Video.js HLS Technology.</p>
    </footer>

    <script src="https://vjs.zencdn.net/8.3.0/video.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. URL se Parameters (videoUrl aur title) nikalna
            const urlParams = new URLSearchParams(window.location.search);
            const videoUrl = urlParams.get('videoUrl');
            const lectureTitle = urlParams.get('title');

            // 2. Title ko page par update karna
            if (lectureTitle) {
                document.getElementById('lectureTitle').textContent = decodeURIComponent(lectureTitle);
                document.title = `${decodeURIComponent(lectureTitle)} - STREAMx`;
            }

            // 3. Player ko setup karna aur .m3u8 link load karna
            if (videoUrl) {
                const player = videojs('pw-hls-player');
                
                player.src({
                    src: decodeURIComponent(videoUrl),
                    type: 'application/vnd.apple.mpegurl' // Aapka wahi MIME type jo video chalayega!
                });

                // Auto-play error handler (Kayi baar browsers block karte hain bina interact kiye)
                player.ready(() => {
                    player.play().catch(error => {
                        console.log("Autoplay was prevented, waiting for user click.");
                    });
                });
            } else {
                document.getElementById('lectureTitle').textContent = "Error: No Video URL Found!";
                document.getElementById('lectureTitle').classList.add('text-rose-500');
            }
        });
    </script>
</body>
      </html>
