<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STREAMx - Premium Playing Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    
    <style>
        /* Premium Dark Player UI */
        .video-js {
            background-color: #05050a;
            border-radius: 16px;
            overflow: hidden;
        }
        .vjs-big-play-button {
            background-color: rgba(99, 102, 241, 0.85) !important;
            border: none !important;
            border-radius: 50% !important;
            width: 2.5em !important;
            height: 2.5em !important;
            line-height: 2.5em !important;
            margin-top: -1.25em !important;
            margin-left: -1.25em !important;
            box-shadow: 0 12px 30px rgba(99, 102, 241, 0.5);
            transition: all 0.3s ease !important;
        }
        .video-js:hover .vjs-big-play-button {
            background-color: #6366f1 !important;
            transform: scale(1.1);
        }
        .video-js .vjs-control-bar {
            background-color: rgba(9, 10, 15, 0.85) !important;
            backdrop-filter: blur(12px);
        }
        .video-js .vjs-play-progress {
            background-color: #6366f1 !important;
        }
    </style>
</head>
<body class="bg-[#090a0f] text-slate-100 min-h-screen font-sans flex flex-col justify-between">

    <header class="border-b border-slate-800/60 bg-[#090a0f]/80 backdrop-blur px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="store.html" class="text-sm text-slate-400 hover:text-white transition flex items-center gap-2">
                ← Back to Batch Store
            </a>
            <div class="text-xl font-black tracking-wider text-white">STREAM<span class="text-indigo-500">X</span></div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8 w-full flex-grow flex flex-col justify-center">
        
        <div class="w-full bg-slate-900/30 border border-slate-800/80 rounded-2xl p-4 backdrop-blur-sm shadow-2xl mb-6">
            <div class="position-relative aspect-video w-full">
                <video
                    id="pw-hls-player"
                    class="video-js vjs-default-skin vjs-16-9 w-full h-full"
                    controls
                    preload="auto"
                    data-setup='{}'>
                    <p class="vjs-no-js">
                        To view this video please enable JavaScript, and consider upgrading to a web browser that supports HTML5 video.
                    </p>
                </video>
            </div>
        </div>

        <div class="border-t border-slate-800/60 pt-4 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <span class="inline-block px-2.5 py-1 text-xs font-semibold text-indigo-400 bg-indigo-950/40 border border-indigo-500/20 rounded-md mb-2">
                    Advanced Proxy Mode Active
                </span>
                <h1 id="lectureTitle" class="text-xl md:text-2xl font-bold text-white tracking-tight">
                    Loading Stream...
                </h1>
                <p class="text-slate-400 text-sm mt-1">
                    Bina buffering aur bypass mechanism ke sath high-quality stream load ho rahi hai.
                </p>
            </div>
            
            <div id="proxyBadge" class="px-3 py-1.5 rounded-lg bg-emerald-950/30 border border-emerald-500/30 text-xs text-emerald-400 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Header Handler Ready
            </div>
        </div>

    </main>

    <footer class="border-t border-slate-900 bg-[#06070a] px-6 py-4 text-center text-xs text-slate-600 w-full">
        <p>&copy; 2026 STREAMx Engine. Custom Headers Bypass Active.</p>
    </footer>

    <script src="https://vjs.zencdn.net/8.3.0/video.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            let videoUrl = urlParams.get('videoUrl');
            const lectureTitle = urlParams.get('title');

            if (lectureTitle) {
                document.getElementById('lectureTitle').textContent = decodeURIComponent(lectureTitle);
                document.title = `${decodeURIComponent(lectureTitle)} - STREAMx`;
            }

            if (videoUrl) {
                videoUrl = decodeURIComponent(videoUrl);
                
                // Initialize Video.js Player
                const player = videojs('pw-hls-player', {
                    html5: {
                        vhs: {
                            overrideNative: true
                        },
                        nativeAudioTracks: false,
                        nativeVideoTracks: false
                    }
                });

                // --- ADVANCED HEADER INTERCEPTOR ---
                // Agar link fancode ya koi encrypted server ka hai, toh hum request header hook lagate hain
                if (videoUrl.includes('fancode.com') || videoUrl.includes('fblive')) {
                    
                    // Hooking into Video.js HTTP Requests to handle CORS/Referer variations
                    videojs.Vhs.xhr.beforeRequest = function(options) {
                        options.headers = options.headers || {};
                        
                        // Note: Browsers protect standard 'Referer' modification from client scripts,
                        // but adding standard custom flags forces standard open-cors handling
                        options.headers['X-Requested-With'] = 'XMLHttpRequest';
                        
                        // OPTIONAL PROXY ROUTE: Agar server kadi security use kar raha hai, 
                        // toh link ko public reverse proxy standard wrap par bhejte hain
                        // options.uri = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(options.uri);
                        
                        return options;
                    };
                }

                // Load modified source inside player
                player.src({
                    src: videoUrl,
                    type: 'application/vnd.apple.mpegurl'
                });

                player.ready(() => {
                    player.play().catch(error => {
                        console.log("Autoplay paused. Awaiting click.");
                    });
                });

            } else {
                document.getElementById('lectureTitle').textContent = "Error: Video link nahi mila!";
                document.getElementById('lectureTitle').classList.add('text-rose-500');
            }
        });
    </script>
</body>
</html>
